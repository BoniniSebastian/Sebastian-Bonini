<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sebastian Bonini</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- TOP RIGHT CONTACT -->
  <a href="#" class="contact-top">KONTAKT</a>

  <section class="hero">
    
    <!-- VIDEO -->
    <video autoplay muted loop playsinline id="hero-video">
      <source src="video.mp4" type="video/mp4">
    </video>

    <!-- OVERLAY -->
    <div class="overlay"></div>

    <!-- TEXT -->
    <div class="hero-content">
      <h1 id="title">SEBASTIAN</h1>
      <h2>BONINI</h2>

      <nav>
        <a href="#">OM MIG</a>
        <a href="#">SAKER JAG GÖR</a>
        <a href="#">FOTOLÄNKAR</a>
      </nav>
    </div>

  </section>

  <!-- EXTRA SCROLL SECTION -->
  <section class="next-section"></section>

  <!-- SCROLL EFFECT -->
  <script>
    const title = document.getElementById("title");

    window.addEventListener("scroll", () => {
      const scroll = window.scrollY;

      // subtil Apple-style effekt
      const scale = 1 + scroll * 0.0004;
      const y = scroll * 0.2;

      title.style.transform = `translateY(${y}px) scale(${scale})`;
      title.style.opacity = 1 - scroll * 0.001;
    });
  </script>

</body>
</html>
