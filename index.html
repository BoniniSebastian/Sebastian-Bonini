<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bluewhales on Tour</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="topbar">
  <div class="logo">🐋 Bluewhales</div>
</div>

<!-- BLUEWALL PREVIEW -->
<div class="bluewall-preview" onclick="openPopup('bluewall')">
  <div id="bluewallPreview">Inga inlägg än...</div>
  <div>✏️</div>
</div>

<!-- MATCHER -->
<div id="timeline"></div>

<!-- POPUP -->
<div id="bluewall-popup" class="popup hidden">
  <div class="popup-content">
    <h2>💬 Bluewall</h2>

    <textarea id="postInput" placeholder="Skriv något..."></textarea>
    <button onclick="addPost()">Posta</button>

    <div id="posts"></div>

    <button onclick="closePopup()">Stäng</button>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
